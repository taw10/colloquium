name: CI Meson

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libgtk-4-dev libmd4c-dev libpoppler-glib-dev librsvg2-dev desktop-file-utils
      - name: Install Meson
        run: pip install meson ninja
      - name: Set up Meson build
        run: meson setup build
      - name: Compile
        run: meson compile -C build

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install gettext gtk4 poppler md4c librsvg desktop-file-utils
      - name: Install Meson
        run: pip install meson ninja
      - name: Set up Meson build
        run: meson setup build
      - name: Compile
        run: meson compile -C build
